spring:
  application:
    name: document-search-service

  # PostgreSQL (source of truth)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:docsearch}
    username: ${DB_USER:docsearch}
    password: ${DB_PASSWORD:docsearch}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 30000
      pool-name: DocSearchPool

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway manages schema; Hibernate only validates
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 50
        jdbc:
          batch_size: 50
    show-sql: false
    open-in-view: false         # Prevent lazy-load anti-pattern

  # Flyway migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms

    # Elasticsearch
    elasticsearch:
      uris: ${ES_URIS:http://localhost:9200}
      username: ${ES_USERNAME:elastic}
      password: ${ES_PASSWORD:elastic}
      connection-timeout: 5s
      socket-timeout: 30s

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: document-indexer
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.docsearch.dto"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Server
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,text/plain
  tomcat:
    threads:
      min-spare: 10
      max: 200
    max-connections: 10000
    accept-count: 100

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.75, 0.95, 0.99

# Resilience4j Circuit Breakers
resilience4j:
  circuitbreaker:
    instances:
      elasticsearch:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
  retry:
    instances:
      elasticsearch:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException

# Application-specific config
app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-secure-256-bit-secret-in-production}
    expiry-minutes: 60

logging:
  level:
    com.docsearch: INFO
    org.springframework.kafka: WARN
    org.elasticsearch: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{tenantId:-}] [%X{requestId:-}] %logger{36} - %msg%n"
